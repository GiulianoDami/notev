<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eventi in attesa – NOTEV</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="/" class="logo">NOT<span>EV</span></a>
      <nav>
        <a href="/">← Indietro</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <h2 style="color: var(--olive); margin-bottom: 1.5rem;">:. Eventi in attesa di approvazione</h2>
    <div id="pending">Caricamento...</div>
  </main>

  <script>
    async function loadPending() {
      const res = await fetch('/api/events/pending');
      const events = await res.json();
      const container = document.getElementById('pending');
      if (!events.length) {
        container.innerHTML = '<div class="empty-state">Nessun evento in attesa</div>';
        return;
      }
      container.innerHTML = events.map(e => `
        <div class="event-card">
          <h3>${escapeHtml(e.title)}</h3>
          <p>${escapeHtml(e.description || '')}</p>
          <p class="event-date"># ${new Date(e.event_date).toLocaleString('it-IT', { dateStyle: 'full', timeStyle: 'short' })}</p>
          <p>Approvazioni: <strong>${e.approvals}/5</strong></p>
          <div class="event-actions">
            <button class="btn btn-approve" onclick="approve(${e.id})">§ Approva</button>
          </div>
        </div>
      `).join('');
    }

    async function approve(id) {
      await fetch(`/api/events/${id}/approve`, { method: 'POST' });
      alert('Approvato!');
      loadPending();
    }

    function escapeHtml(text) {
      return text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    loadPending();
  </script>
</body>
</html>
