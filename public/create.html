<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aggiungi evento – NOTEV</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="/" class="logo">NOT<span>EV</span></a>
      <nav>
        <a href="/">← Indietro</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="form-card">
      <h2>Nuovo evento</h2>
      <form id="createForm">
        <div class="form-group">
          <label for="title">Titolo *</label>
          <input type="text" name="title" id="title" required>
        </div>

        <div class="form-group">
          <label for="description">Descrizione</label>
          <textarea name="description" id="description" rows="3"></textarea>
        </div>

        <div class="form-group">
          <label for="event_date">Data e ora *</label>
          <input type="datetime-local" name="event_date" id="event_date" required>
        </div>

        <div class="form-group checkbox-group">
          <input type="checkbox" name="hide_location" id="hideLocationCheck">
          <label for="hideLocationCheck">Nascondi posizione esatta (servirà password per vederla)</label>
        </div>

        <div id="locationPasswordGroup" class="form-group" style="display:none;">
          <label for="location_password">Password per sbloccare la posizione *</label>
          <input type="password" name="location_password" id="location_password" placeholder="Condividi solo con i partecipanti">
          <div class="form-hint">Verrà richiesta a chi vorrà vedere la mappa.</div>
        </div>

        <div class="form-group">
          <label for="link">Link (opzionale)</label>
          <input type="url" name="link" id="link" placeholder="https://...">
        </div>

        <div class="form-group">
          <label for="image_url">URL immagine (opzionale)</label>
          <input type="url" name="image_url" id="image_url" placeholder="https://...">
        </div>

        <div class="form-group">
          <label for="password">Password per modificare l'evento *</label>
          <input type="password" name="password" id="password" required placeholder="Scegli una password">
          <div class="form-hint">Ti servirà per modificare i dettagli in futuro.</div>
        </div>

        <p style="font-weight:600; margin: 1rem 0 0.5rem;">Clicca sulla mappa per impostare la posizione:</p>
        <div id="map"></div>
        <input type="hidden" name="latitude" id="lat">
        <input type="hidden" name="longitude" id="lng">
        <div class="form-hint">Solo punti all'interno del cerchio blu sono consentiti.</div>

        <div class="g-recaptcha" data-sitekey="6Lf9uxctAAAAAP38JTMm0JuZNkihWaNUMEkyDDlf" style="margin: 1.5rem 0;"></div>
        <button type="submit" class="btn btn-primary" style="width:100%;">Pubblica evento</button>
      </form>
    </div>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
  <script>
    const CENTER_LAT = 43.7166;
    const CENTER_LON = 10.4000;
    const RADIUS_KM = 60;

    const map = L.map('map').setView([CENTER_LAT, CENTER_LON], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    L.circle([CENTER_LAT, CENTER_LON], {
      radius: RADIUS_KM * 1000,
      color: '#c0523d',
      fillColor: '#c0523d',
      fillOpacity: 0.1
    }).addTo(map);

    let marker;
    map.on('click', function(e) {
      const lat = e.latlng.lat;
      const lng = e.latlng.lng;
      const dLat = (lat - CENTER_LAT) * Math.PI / 180;
      const dLon = (lng - CENTER_LON) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2 + Math.cos(CENTER_LAT*Math.PI/180)*Math.cos(lat*Math.PI/180)*Math.sin(dLon/2)**2;
      const dist = 6371 * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      if (dist > RADIUS_KM) {
        alert('Posizione fuori dall\'area consentita.');
        return;
      }
      if (marker) map.removeLayer(marker);
      marker = L.marker([lat, lng]).addTo(map);
      document.getElementById('lat').value = lat;
      document.getElementById('lng').value = lng;
    });

    document.getElementById('hideLocationCheck').addEventListener('change', function() {
      document.getElementById('locationPasswordGroup').style.display = this.checked ? 'block' : 'none';
    });

    document.getElementById('createForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData.entries());
      const payload = {
        title: data.title,
        description: data.description || undefined,
        event_date: data.event_date,
        latitude: data.latitude ? parseFloat(data.latitude) : undefined,
        longitude: data.longitude ? parseFloat(data.longitude) : undefined,
        hide_location: data.hide_location === 'on',
        link: data.link || undefined,
        image_url: data.image_url || undefined,
        password: data.password,
        location_password: data.hide_location === 'on' ? data.location_password : undefined,
        recaptcha: grecaptcha.getResponse()
      };

      const res = await fetch('/api/events', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const result = await res.json();
      if (res.ok) {
        alert('Evento creato! Apparirà dopo 10 approvazioni.');
        window.location.href = '/';
      } else {
        alert('Errore: ' + result.error);
      }
    });
  </script>
</body>
</html>
