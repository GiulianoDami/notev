<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modifica evento – NOTEV</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="/" class="logo">NOT<span>EV</span></a>
      <nav>
        <a href="/">← Indietro</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="form-card" id="auth">
      <h2>Modifica evento</h2>
      <div class="form-group">
        <label for="password">Password dell'evento</label>
        <input type="password" id="password" required>
      </div>
      <button class="btn btn-primary" onclick="loadEventData()">Carica evento</button>
      <p class="error-message" id="auth-error"></p>
    </div>

    <form id="editForm" class="form-card" style="display:none;">
      <h2>Modifica dettagli</h2>
      <div class="form-group">
        <label for="edit-title">Titolo</label>
        <input type="text" name="title" id="edit-title" required>
      </div>
      <div class="form-group">
        <label for="edit-description">Descrizione</label>
        <textarea name="description" id="edit-description" rows="3"></textarea>
      </div>
      <div class="form-group">
        <label for="edit-event_date">Data e ora</label>
        <input type="datetime-local" name="event_date" id="edit-event_date" required>
      </div>
      <div class="form-group checkbox-group">
        <input type="checkbox" name="hide_location" id="edit-hide_location">
        <label for="edit-hide_location">Nascondi posizione esatta</label>
      </div>
      <div class="form-group">
        <label for="edit-link">Link</label>
        <input type="url" name="link" id="edit-link">
      </div>
      <div class="form-group">
        <label for="edit-image_url">URL immagine</label>
        <input type="url" name="image_url" id="edit-image_url">
      </div>
      <div class="form-group">
        <label for="edit-location_password">Nuova password posizione (lascia vuoto per non modificare)</label>
        <input type="password" name="location_password" id="edit-location_password" placeholder="Opzionale">
      </div>
      <input type="hidden" name="id" id="event-id">
      <input type="hidden" name="password" id="event-password">
      <button type="submit" class="btn btn-primary" style="width:100%;">Salva modifiche</button>
    </form>
  </main>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const eventId = urlParams.get('id');
    if (!eventId) {
      document.body.innerHTML = '<main class="container"><p>ID evento mancante. <a href="/">Torna indietro</a></p></main>';
    }

    async function loadEventData() {
      const password = document.getElementById('password').value;
      try {
        const res = await fetch(`/api/events/${eventId}?password=${encodeURIComponent(password)}`);
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || 'Caricamento fallito');
        }
        const event = await res.json();
        document.getElementById('auth').style.display = 'none';
        document.getElementById('editForm').style.display = 'block';
        document.getElementById('event-id').value = event.id;
        document.getElementById('event-password').value = password;
        document.getElementById('edit-title').value = event.title || '';
        document.getElementById('edit-description').value = event.description || '';
        if (event.event_date) {
          const d = new Date(event.event_date);
          document.getElementById('edit-event_date').value = new Date(d.getTime() - d.getTimezoneOffset()*60000).toISOString().slice(0,16);
        }
        document.getElementById('edit-hide_location').checked = event.hide_location === 1;
        document.getElementById('edit-link').value = event.link || '';
        document.getElementById('edit-image_url').value = event.image_url || '';
      } catch (e) {
        document.getElementById('auth-error').textContent = e.message;
      }
    }

    document.getElementById('editForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData.entries());
      const payload = {
        password: data.password,
        title: data.title,
        description: data.description || undefined,
        event_date: data.event_date,
        hide_location: data.hide_location === 'on',
        link: data.link || undefined,
        image_url: data.image_url || undefined,
        location_password: data.location_password || undefined,
      };
      const res = await fetch(`/api/events/${data.id}/edit`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const result = await res.json();
      if (res.ok) {
        alert('Evento aggiornato!');
        window.location.href = '/';
      } else {
        alert('Errore: ' + result.error);
      }
    });
  </script>
</body>
</html>
